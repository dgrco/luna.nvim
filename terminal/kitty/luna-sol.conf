# Luna Sol – sol variant (golden-yellow accent)
# Kitty terminal theme
#
# Place in ~/.config/kitty/themes/luna-sol.conf
# Or include directly:  include themes/luna-sol.conf

background              #1B1D26
foreground              #D7D7D7
selection_background    #5E697E
selection_foreground    #495163
url_color               #E3CF65
cursor                  #AEAFAD
cursor_text_color       #D7D7D7
active_border_color     #D4B96A
inactive_border_color   #272932
bell_border_color       #E39A65
visual_bell_color       none
wayland_titlebar_color  #1B1D26
macos_titlebar_color    #1B1D26

# Tab bar
active_tab_foreground   #D7D7D7
active_tab_background   #21252D
active_tab_font_style   bold
inactive_tab_foreground #5E6173
inactive_tab_background #14161D
inactive_tab_font_style normal
tab_bar_background      #14161D
tab_bar_margin_color    #14161D

# Normal colours (0-7)
color0  #14161D
color1  #D4956A
color2  #74C7A4
color3  #E3CF65
color4  #8DBBD3
color5  #D4B96A
color6  #AF98E6
color7  #D7D7D7

# Bright colours (8-15)
color8  #272932
color9  #D95555
color10 #76C5A4
color11 #E39A65
color12 #6CAEC0
color13 #E0828D
color14 #8DBBD3
color15 #E9E9E9

# Mark colours
mark1_foreground #1B1D26
mark1_background #D4B96A
mark2_foreground #1B1D26
mark2_background #E3CF65
mark3_foreground #1B1D26
mark3_background #74C7A4
